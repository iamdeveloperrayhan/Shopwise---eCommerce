<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ecommerce{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #222; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #fff; text-decoration: none; margin-left: 16px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 100vw; padding: 0 16px; height: 100vh; display: flex;}
        .card { background: #fff; border-radius: 6px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,.1); width: 50%; margin: auto; }
        .btn { display: inline-block; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #007bff; color: #fff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-danger:hover { background: #a71d2a; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #4e555b; }
        .messages { margin-bottom: 16px; }
        .messages li { list-style: none; padding: 10px 14px; border-radius: 4px; margin-bottom: 8px; }
        .messages .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .messages .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .messages .info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .errorlist { color: #dc3545; font-size: 13px; margin-top: 4px; padding-left: 16px; }
        h1, h2 { margin-bottom: 24px; }
    </style>
</head>
<body>
<div class="container">
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
