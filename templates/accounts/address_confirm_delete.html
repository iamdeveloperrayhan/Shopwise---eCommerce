{% extends "base.html" %}
{% block title %}Delete Address{% endblock %}

{% block content %}
<div class="card" style="max-width:25%;">
    <h1>Delete Address</h1>
    <p style="margin-bottom:20px;">
        Are you sure you want to delete this address?
    </p>
    <div style="background:#f8f9fa;border:1px solid #dee2e6;border-radius:4px;padding:16px;margin-bottom:24px;">
        <strong>{{ address.street }}</strong><br>
        {{ address.city }}, {{ address.postal_code }}<br>
        {{ address.country }}
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'address_list' %}" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
